<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naina's GitHub Pack HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808; --surface: #101010; --surface2: #181818; --surface3: #202020;
    --border: #1e1e1e; --border2: #2a2a2a; --text: #efefef;
    --muted: #4a4a4a; --muted2: #666; --red: #ff4444; --yellow: #f5c518;
    --blue: #4a9eff; --green: #2ecc71; --purple: #b06cff; --pink: #ff6eb4;
    --orange: #ff8c42; --cyan: #00d4d4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 240px; min-width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; padding: 20px 12px; gap: 2px; }
  .logo { padding: 4px 8px 20px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
  .logo-top { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted2); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 4px; }
  .logo-name { font-size: 16px; font-weight: 800; color: var(--yellow); letter-spacing: -0.5px; }
  .sidebar-label { font-size: 9px; text-transform: uppercase; letter-spacing: 2.5px; color: var(--muted); padding: 10px 8px 4px; font-family: 'Space Mono', monospace; }
  .sb-btn { background: none; border: none; color: var(--muted2); text-align: left; padding: 7px 10px; border-radius: 6px; cursor: pointer; font-family: 'Syne', sans-serif; font-size: 13px; transition: all 0.12s; display: flex; align-items: center; gap: 9px; width: 100%; }
  .sb-btn:hover { background: var(--surface2); color: var(--text); }
  .sb-btn.active { background: var(--surface2); color: var(--text); }
  .sb-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .sb-count { margin-left: auto; font-size: 10px; font-family: 'Space Mono', monospace; color: var(--muted); background: var(--surface3); padding: 1px 6px; border-radius: 10px; }
  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .topbar { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .search { flex: 1; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; padding: 9px 14px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px; outline: none; transition: border 0.2s; }
  .search:focus { border-color: var(--yellow); }
  .search::placeholder { color: var(--muted); }
  .count-badge { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted2); white-space: nowrap; }
  .grid { padding: 20px 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 12px; align-content: start; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden; }
  .card:hover { border-color: var(--border2); transform: translateY(-1px); background: var(--surface2); }
  .card-accent { position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .card-emoji { font-size: 20px; }
  .card-urgency { font-size: 9px; font-family: 'Space Mono', monospace; padding: 2px 7px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
  .u-now { background: rgba(255,68,68,0.12); color: var(--red); border: 1px solid rgba(255,68,68,0.25); }
  .u-soon { background: rgba(245,197,24,0.12); color: var(--yellow); border: 1px solid rgba(245,197,24,0.25); }
  .u-later { background: rgba(74,158,255,0.12); color: var(--blue); border: 1px solid rgba(74,158,255,0.25); }
  .card-type { font-size: 9px; font-family: 'Space Mono', monospace; padding: 2px 7px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: inline-block; }
  .card-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 6px; line-height: 1.3; }
  .card-tagline { font-size: 11px; color: var(--muted2); line-height: 1.5; margin-bottom: 12px; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; }
  .card-duration { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--muted); }
  .status-pip { width: 7px; height: 7px; border-radius: 50%; }
  .s-not { background: var(--muted); }
  .s-prog { background: var(--yellow); }
  .s-done { background: var(--green); }
  .card-warn { font-size: 9px; color: var(--orange); font-family: 'Space Mono', monospace; margin-top: 6px; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; width: 100%; max-width: 700px; max-height: 92vh; overflow-y: auto; position: relative; }
  .modal-top { padding: 28px 28px 0; position: sticky; top: 0; background: var(--surface); z-index: 1; border-radius: 14px 14px 0 0; }
  .modal-close { position: absolute; top: 16px; right: 16px; background: var(--surface2); border: 1px solid var(--border2); color: var(--muted2); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
  .modal-close:hover { color: var(--text); }
  .modal-emoji { font-size: 32px; margin-bottom: 10px; }
  .modal-name { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  .modal-tagline { color: var(--muted2); font-size: 13px; line-height: 1.5; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .modal-body { padding: 20px 28px 28px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .ib { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .ib.full { grid-column: 1 / -1; }
  .ib.warn { border-color: rgba(255,140,66,0.3); background: rgba(255,140,66,0.05); }
  .ib.tip { border-color: rgba(245,197,24,0.3); background: rgba(245,197,24,0.04); }
  .ib-label { font-size: 9px; font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted2); margin-bottom: 5px; }
  .ib-label.warn-label { color: var(--orange); }
  .ib-label.tip-label { color: var(--yellow); }
  .ib-val { font-size: 12px; color: var(--text); line-height: 1.55; }
  .ib-val.highlight { color: var(--yellow); font-weight: 700; }
  .ib-val.red { color: var(--red); }
  .ib-val.green { color: var(--green); }
  .sec-title { font-size: 9px; font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 2px; color: var(--muted2); margin: 20px 0 10px; }
  .urgency-row { display: flex; gap: 8px; margin-bottom: 4px; }
  .u-btn { flex: 1; padding: 8px; border-radius: 7px; border: 1px solid var(--border2); background: var(--surface2); color: var(--muted2); font-family: 'Space Mono', monospace; font-size: 10px; cursor: pointer; transition: all 0.12s; text-align: center; }
  .u-btn:hover { border-color: #444; color: var(--text); }
  .u-btn.sel-now { background: rgba(255,68,68,0.12); color: var(--red); border-color: rgba(255,68,68,0.4); }
  .u-btn.sel-soon { background: rgba(245,197,24,0.12); color: var(--yellow); border-color: rgba(245,197,24,0.4); }
  .u-btn.sel-later { background: rgba(74,158,255,0.12); color: var(--blue); border-color: rgba(74,158,255,0.4); }
  .notes-box { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 12px 14px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px; resize: vertical; min-height: 110px; outline: none; transition: border 0.2s; line-height: 1.6; }
  .notes-box:focus { border-color: var(--yellow); }
  .notes-box::placeholder { color: var(--muted); }
  .link-add-row { display: flex; gap: 8px; align-items: center; }
  .link-inp { background: var(--surface2); border: 1px solid var(--border2); border-radius: 7px; padding: 9px 12px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 12px; outline: none; transition: border 0.2s; }
  .link-inp:focus { border-color: var(--yellow); }
  .link-inp::placeholder { color: var(--muted); }
  .link-inp.lbl { width: 160px; flex-shrink: 0; }
  .link-inp.url { flex: 1; }
  .saved-links-container { margin-bottom: 10px; }
  .saved-link-item { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 9px 12px; margin-bottom: 6px; }
  .saved-link-item .lbl-tag { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--muted2); flex-shrink: 0; }
  .saved-link-item a { flex: 1; color: var(--blue); text-decoration: none; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .saved-link-item a:hover { text-decoration: underline; }
  .status-row { display: flex; gap: 8px; }
  .stat-btn { flex: 1; padding: 9px; border-radius: 7px; border: 1px solid var(--border2); background: var(--surface2); color: var(--muted2); font-family: 'Syne', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.12s; text-align: center; }
  .stat-btn:hover { border-color: #444; color: var(--text); }
  .stat-btn.sel-ns { background: rgba(74,74,74,0.2); color: #aaa; border-color: #444; }
  .stat-btn.sel-ip { background: rgba(245,197,24,0.1); color: var(--yellow); border-color: rgba(245,197,24,0.4); }
  .stat-btn.sel-done { background: rgba(46,204,113,0.1); color: var(--green); border-color: rgba(46,204,113,0.4); }
  .btn { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 8px 14px; border-radius: 7px; cursor: pointer; font-family: 'Syne', sans-serif; font-size: 12px; transition: all 0.12s; white-space: nowrap; }
  .btn:hover { border-color: #444; }
  .btn.primary { background: var(--yellow); color: #000; border-color: var(--yellow); font-weight: 700; font-size: 13px; padding: 10px 20px; }
  .btn.primary:hover { background: #e8bb00; }
  .btn.primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .btn.sm { padding: 6px 10px; font-size: 11px; }
  .btn.danger { color: var(--red); border-color: transparent; }
  .btn.danger:hover { background: rgba(255,68,68,0.1); border-color: rgba(255,68,68,0.2); }
  .save-row { display: flex; align-items: center; gap: 12px; margin-top: 16px; }
  .save-msg { font-size: 11px; font-family: 'Space Mono', monospace; opacity: 0; transition: opacity 0.3s; }
  .save-msg.show { opacity: 1; }
  .save-msg.ok { color: var(--green); }
  .save-msg.err { color: var(--red); }
  .loading { grid-column: 1/-1; display: flex; align-items: center; justify-content: center; padding: 80px; color: var(--muted2); font-family: 'Space Mono', monospace; font-size: 12px; gap: 10px; }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--yellow); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { grid-column: 1/-1; text-align: center; padding: 60px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 12px; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-top">GitHub Pack</div>
      <div class="logo-name">Naina's HQ</div>
    </div>
    <div class="sidebar-label">By Timeline</div>
    <button class="sb-btn active" onclick="setFilter('all',this)"><div class="sb-dot" style="background:#444"></div> All Tools<span class="sb-count" id="cnt-all">0</span></button>
    <button class="sb-btn" onclick="setFilter('now',this)"><div class="sb-dot" style="background:var(--red)"></div> Start Now<span class="sb-count" id="cnt-now">0</span></button>
    <button class="sb-btn" onclick="setFilter('soon',this)"><div class="sb-dot" style="background:var(--yellow)"></div> Start Soon<span class="sb-count" id="cnt-soon">0</span></button>
    <button class="sb-btn" onclick="setFilter('later',this)"><div class="sb-dot" style="background:var(--blue)"></div> Start Later<span class="sb-count" id="cnt-later">0</span></button>
    <div class="sidebar-label" style="margin-top:8px">By Category</div>
    <button class="sb-btn" onclick="setFilter('Learning',this)"><div class="sb-dot" style="background:var(--purple)"></div> Learning</button>
    <button class="sb-btn" onclick="setFilter('Design',this)"><div class="sb-dot" style="background:var(--pink)"></div> Design</button>
    <button class="sb-btn" onclick="setFilter('Hosting',this)"><div class="sb-dot" style="background:var(--blue)"></div> Hosting</button>
    <button class="sb-btn" onclick="setFilter('Payments',this)"><div class="sb-dot" style="background:var(--green)"></div> Payments</button>
    <button class="sb-btn" onclick="setFilter('Security',this)"><div class="sb-dot" style="background:var(--orange)"></div> Security</button>
    <button class="sb-btn" onclick="setFilter('Productivity',this)"><div class="sb-dot" style="background:var(--cyan)"></div> Productivity</button>
    <button class="sb-btn" onclick="setFilter('Dev Tools',this)"><div class="sb-dot" style="background:var(--yellow)"></div> Dev Tools</button>
    <button class="sb-btn" onclick="setFilter('Domain',this)"><div class="sb-dot" style="background:var(--red)"></div> Domain</button>
    <div class="sidebar-label" style="margin-top:8px">By Status</div>
    <button class="sb-btn" onclick="setFilter('Not Started',this)"><div class="sb-dot" style="background:var(--muted)"></div> Not Started</button>
    <button class="sb-btn" onclick="setFilter('In Progress',this)"><div class="sb-dot" style="background:var(--yellow)"></div> In Progress</button>
    <button class="sb-btn" onclick="setFilter('Done',this)"><div class="sb-dot" style="background:var(--green)"></div> Done</button>
  </aside>
  <main class="main">
    <div class="topbar">
      <input class="search" placeholder="Search tools..." oninput="doSearch(this.value)" />
      <span class="count-badge" id="countBadge">— tools</span>
    </div>
    <div class="grid" id="grid">
      <div class="loading"><div class="spinner"></div> Loading...</div>
    </div>
  </main>
</div>

<div class="overlay" id="overlay" onclick="maybeClose(event)">
  <div class="modal" id="modal">
    <div class="modal-top">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-emoji" id="mEmoji"></div>
      <div class="modal-name" id="mName"></div>
      <div class="modal-tagline" id="mTagline"></div>
    </div>
    <div class="modal-body">
      <div class="info-grid" id="mInfoGrid"></div>
      <div class="sec-title">📌 Your Timeline Label</div>
      <div class="urgency-row">
        <button class="u-btn" id="ubtn-now" onclick="setUrgency('now')">🔴 Start Now</button>
        <button class="u-btn" id="ubtn-soon" onclick="setUrgency('soon')">🟡 Start Soon</button>
        <button class="u-btn" id="ubtn-later" onclick="setUrgency('later')">🔵 Start Later</button>
      </div>
      <div style="font-size:10px;color:var(--muted2);font-family:'Space Mono',monospace;margin-top:4px;">Override my suggestion — your call.</div>
      <div class="sec-title">📝 Notes & Learnings</div>
      <textarea class="notes-box" id="mNotes" placeholder="Type anything — what you learned, questions, thoughts, progress..."></textarea>
      <div class="sec-title">🔗 Documents & Links</div>
      <div class="saved-links-container" id="savedLinks"></div>
      <div class="link-add-row">
        <input class="link-inp lbl" id="linkLabel" placeholder="Label (e.g. Week 1)" />
        <input class="link-inp url" id="linkUrl" placeholder="Paste any link — Drive, Notion, PDF..." />
        <button class="btn sm" onclick="addLink()">+ Add</button>
      </div>
      <div class="sec-title">✅ Status</div>
      <div class="status-row">
        <button class="stat-btn" id="sbtn-ns" onclick="setStatus('Not Started')">⚪ Not Started</button>
        <button class="stat-btn" id="sbtn-ip" onclick="setStatus('In Progress')">🟡 In Progress</button>
        <button class="stat-btn" id="sbtn-done" onclick="setStatus('Done')">🟢 Done</button>
      </div>
      <div class="save-row">
        <button class="btn primary" id="saveBtn" onclick="saveData()">Save Everything</button>
        <span class="save-msg" id="saveMsg"></span>
      </div>
    </div>
  </div>
</div>

const TOOLS = [
  { id:'codedex', name:'Codedex', emoji:'🎮', type:'Learning', defaultUrgency:'now', color:'var(--purple)', duration:'6 months free', tagline:'Learn to code from zero — feels like a game, built for Gen Z', baby:'This is your starting point for coding. It teaches you Python, HTML, CSS, JavaScript — but it feels like playing a game, not studying. You earn XP, level up, complete challenges. Made specifically for people who have never touched code in their life.', learn:'Python basics, HTML, CSS, JavaScript fundamentals', prereqs:'Zero. Absolute zero. Start here.', whenRedeem:'NOW — this is your entry point. Activate and start immediately.', clockStart:'Clock starts the moment you activate. You have 6 months from that day.', expires:'After 6 months you lose access to premium content. Free tier stays but is limited.', autoCharge:'No automatic charge — they will email you before it ends. You choose to pay or not.', renewable:'No — one time student benefit.', tips:'Pick ONE language to start — go with Python. Don\'t jump between languages. Go in order. 30 mins a day beats 3 hours once a week.', redeem:'education.github.com/pack → find Codedex → click Get Access → sign in with GitHub', after:'You can write basic Python scripts, understand how code works, and start building simple things. This unlocks everything else.' },

  { id:'frontendmasters', name:'FrontendMasters', emoji:'🏗️', type:'Learning', defaultUrgency:'now', color:'var(--purple)', duration:'6 months free (worth $390 / ₹32,000)', tagline:'Build websites — add ₹15k–₹30k to what you can charge', baby:'Video lessons that teach you to build websites from scratch. Proper structured courses, not random YouTube videos. If a client asks "can you build me a landing page?" — after this, you say yes.', learn:'Web development, JavaScript, building real functional websites', prereqs:'Basic HTML/CSS from Codedex first — about 3-4 weeks in.', whenRedeem:'After you have HTML/CSS basics from Codedex. Don\'t activate before.', clockStart:'Clock starts on activation. 6 months.', expires:'After 6 months, access gone. Very worth using intensively.', autoCharge:'No automatic charge.', renewable:'No — one time.', tips:'Don\'t try to learn everything. Pick the JavaScript path and go deep. Depth beats breadth.', redeem:'education.github.com/pack → FrontendMasters → 6 months free → connect GitHub', after:'You can build landing pages and portfolio sites for clients. Charge ₹15k–₹30k per page.' },

const TYPE_COLORS = {
  'Learning':'var(--purple)','Design':'var(--pink)','Hosting':'var(--blue)',
  'Payments':'var(--green)','Security':'var(--orange)','Productivity':'var(--cyan)',
  'Dev Tools':'var(--yellow)','Domain':'var(--red)'
};

let activeFilter = 'all';
let activeSearch = '';
let savedData = {};
let currentTool = null;
let modalLinks = [];
let modalUrgency = null;
let modalStatus = null;

// ── APPWRITE — FIXED ─────────────────────────────────────
async function awFetch(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: { 'X-Appwrite-Project': AW.project, 'Content-Type': 'application/json' }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${AW.url}${path}`, opts);
  return res;
}

async function loadData() {
  try {
    const res = await awFetch(`/databases/${AW.db}/collections/${AW.col}/documents?queries[]=limit(100)`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.documents) {
      data.documents.forEach(doc => {
        const raw = doc.note || '';
        const parts = raw.split('|||URGENCY:');
        const note = parts[0];
        const urgency = parts.length === 2 ? parts[1].trim() : null;
        savedData[doc.$id] = {
          note,
          links: tryParse(doc.links, []),
          status: doc.status || 'Not Started',
          urgency
        };
      });
    }
  } catch (e) {
    console.error('Load error:', e);
  }
  updateCounts();
  renderGrid();
}

// FIXED: correct body structure for both PATCH and POST
async function saveDoc(toolId, note, links, status, urgency) {
  const noteWithUrgency = urgency ? `${note}|||URGENCY:${urgency}` : note;
  const docData = {
    note: noteWithUrgency,
    links: JSON.stringify(links),
    status: status
  };

  // Try PATCH first (update existing)
  const patchRes = await awFetch(
    `/databases/${AW.db}/collections/${AW.col}/documents/${toolId}`,
    'PATCH',
    { data: docData }
  );

  if (patchRes.status === 404) {
    // Doesn't exist yet — POST to create it
    // FIXED: data goes inside a "data" key, not spread at top level
    const postRes = await awFetch(
      `/databases/${AW.db}/collections/${AW.col}/documents`,
      'POST',
      {
        documentId: toolId,
        data: docData,
        permissions: ['read("any")', 'write("any")']
      }
    );
    if (!postRes.ok) {
      const err = await postRes.json();
      throw new Error(err.message || `Create failed: ${postRes.status}`);
    }
  } else if (!patchRes.ok) {
    const err = await patchRes.json();
    throw new Error(err.message || `Update failed: ${patchRes.status}`);
  }

  // Update local cache immediately so UI reflects change
  savedData[toolId] = { note, links, status, urgency };
}

function tryParse(str, fallback) {
  try { return JSON.parse(str); } catch { return fallback; }
}

function getUrgency(tool) {
  return (savedData[tool.id] && savedData[tool.id].urgency) || tool.defaultUrgency;
}

function getStatus(toolId) {
  return (savedData[toolId] && savedData[toolId].status) || 'Not Started';
}

function updateCounts() {
  document.getElementById('cnt-all').textContent = TOOLS.length;
  document.getElementById('cnt-now').textContent = TOOLS.filter(t => getUrgency(t) === 'now').length;
  document.getElementById('cnt-soon').textContent = TOOLS.filter(t => getUrgency(t) === 'soon').length;
  document.getElementById('cnt-later').textContent = TOOLS.filter(t => getUrgency(t) === 'later').length;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  let list = [...TOOLS];
  if (activeFilter !== 'all') {
    if (['now','soon','later'].includes(activeFilter)) {
      list = list.filter(t => getUrgency(t) === activeFilter);
    } else if (['Not Started','In Progress','Done'].includes(activeFilter)) {
      list = list.filter(t => getStatus(t.id) === activeFilter);
    } else {
      list = list.filter(t => t.type === activeFilter);
    }
  }
  if (activeSearch) {
    const q = activeSearch.toLowerCase();
    list = list.filter(t =>
      t.name.toLowerCase().includes(q) ||
      t.tagline.toLowerCase().includes(q) ||
      t.type.toLowerCase().includes(q) ||
      t.baby.toLowerCase().includes(q)
    );
  }
  document.getElementById('countBadge').textContent = `${list.length} tools`;
  if (!list.length) { grid.innerHTML = '<div class="empty">No tools found</div>'; return; }
  grid.innerHTML = list.map(t => {
    const urg = getUrgency(t);
    const stat = getStatus(t.id);
    const tc = TYPE_COLORS[t.type] || '#555';
    const statClass = stat === 'Done' ? 's-done' : stat === 'In Progress' ? 's-prog' : 's-not';
    const hasWarning = t.duration.includes('⚠️') || t.tips.toLowerCase().includes('⚠️');
    return `<div class="card" onclick="openModal('${t.id}')">
      <div class="card-accent" style="background:${t.color}"></div>
      <div class="card-header">
        <div class="card-emoji">${t.emoji}</div>
        <div class="card-urgency u-${urg}">${urg==='now'?'🔴 Now':urg==='soon'?'🟡 Soon':'🔵 Later'}</div>
      </div>
      <div class="card-type" style="background:${tc}18;color:${tc}">${t.type}</div>
      <div class="card-name">${t.name}</div>
      <div class="card-tagline">${t.tagline}</div>
      ${hasWarning?'<div class="card-warn">⚠️ Read warnings before activating</div>':''}
      <div class="card-footer">
        <div class="card-duration">${t.duration.split('(')[0].trim()}</div>
        <div class="status-pip ${statClass}" title="${stat}"></div>
      </div>
    </div>`;
  }).join('');
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderGrid();
}

function doSearch(q) { activeSearch = q; renderGrid(); }

function openModal(toolId) {
  const t = TOOLS.find(x => x.id === toolId);
  if (!t) return;
  currentTool = t;
  const d = savedData[toolId] || {};
  modalLinks = d.links ? [...d.links] : [];
  modalUrgency = d.urgency || t.defaultUrgency;
  modalStatus = d.status || 'Not Started';

  document.getElementById('mEmoji').textContent = t.emoji;
  document.getElementById('mName').textContent = t.name;
  document.getElementById('mTagline').textContent = t.tagline;

  const tc = TYPE_COLORS[t.type] || '#555';
  const warnWhen = t.whenRedeem.includes('⚠️') || t.whenRedeem.includes('URGENT') || t.whenRedeem.includes('NOW');
  document.getElementById('mInfoGrid').innerHTML = `
    <div class="ib"><div class="ib-label">⏳ How Long</div><div class="ib-val highlight">${t.duration}</div></div>
    <div class="ib"><div class="ib-label">🏷️ Category</div><div class="ib-val" style="color:${tc}">${t.type}</div></div>
    <div class="ib full"><div class="ib-label">👶 What Is It</div><div class="ib-val">${t.baby}</div></div>
    <div class="ib"><div class="ib-label">📖 What You Learn</div><div class="ib-val">${t.learn}</div></div>
    <div class="ib"><div class="ib-label">📋 Prerequisites</div><div class="ib-val">${t.prereqs}</div></div>
    <div class="ib full ${warnWhen?'warn':''}"><div class="ib-label ${warnWhen?'warn-label':''}">🎯 When To Redeem</div><div class="ib-val">${t.whenRedeem}</div></div>
    <div class="ib"><div class="ib-label">⏰ When Clock Starts</div><div class="ib-val">${t.clockStart}</div></div>
    <div class="ib"><div class="ib-label">📅 What Happens When It Expires</div><div class="ib-val">${t.expires}</div></div>
    <div class="ib"><div class="ib-label">💳 Auto-Charged After?</div><div class="ib-val ${t.autoCharge==='No.'||t.autoCharge==='No'?'green':'red'}">${t.autoCharge}</div></div>
    <div class="ib"><div class="ib-label">🔄 Renewable?</div><div class="ib-val">${t.renewable}</div></div>
    <div class="ib full tip"><div class="ib-label tip-label">💡 Tips & Traps To Know First</div><div class="ib-val">${t.tips}</div></div>
    <div class="ib full"><div class="ib-label">🔑 How To Redeem</div><div class="ib-val">${t.redeem}</div></div>
    <div class="ib full"><div class="ib-label">🚀 After This, You Can</div><div class="ib-val">${t.after}</div></div>
  `;

  document.getElementById('mNotes').value = d.note || '';
  renderUrgencyBtns();
  renderStatusBtns();
  renderSavedLinks();
  const msg = document.getElementById('saveMsg');
  msg.textContent = '';
  msg.className = 'save-msg';
  document.getElementById('saveBtn').disabled = false;
  document.getElementById('saveBtn').textContent = 'Save Everything';
  document.getElementById('overlay').classList.add('open');
}

function renderUrgencyBtns() {
  ['now','soon','later'].forEach(u => {
    const btn = document.getElementById(`ubtn-${u}`);
    btn.className = 'u-btn';
    if (modalUrgency === u) btn.classList.add(`sel-${u}`);
  });
}

function renderStatusBtns() {
  const map = { 'Not Started':'ns', 'In Progress':'ip', 'Done':'done' };
  Object.entries(map).forEach(([s, k]) => {
    const btn = document.getElementById(`sbtn-${k}`);
    btn.className = 'stat-btn';
    if (modalStatus === s) btn.classList.add(`sel-${k}`);
  });
}

// These now just update local state + re-render buttons — save happens on "Save Everything"
function setUrgency(u) { modalUrgency = u; renderUrgencyBtns(); }
function setStatus(s) { modalStatus = s; renderStatusBtns(); }

function renderSavedLinks() {
  const c = document.getElementById('savedLinks');
  if (!modalLinks.length) { c.innerHTML = ''; return; }
  c.innerHTML = modalLinks.map((l, i) => `
    <div class="saved-link-item">
      <span class="lbl-tag">${l.label}</span>
      <a href="${l.url}" target="_blank">${l.url}</a>
      <button class="btn sm danger" onclick="removeLink(${i})">✕</button>
    </div>`).join('');
}

function addLink() {
  const label = document.getElementById('linkLabel').value.trim() || 'Link';
  const url = document.getElementById('linkUrl').value.trim();
  if (!url) return;
  modalLinks.push({ label, url });
  document.getElementById('linkLabel').value = '';
  document.getElementById('linkUrl').value = '';
  renderSavedLinks();
}

function removeLink(i) { modalLinks.splice(i, 1); renderSavedLinks(); }

async function saveData() {
  if (!currentTool) return;
  const btn = document.getElementById('saveBtn');
  const msg = document.getElementById('saveMsg');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  msg.textContent = '';
  msg.className = 'save-msg';

  const note = document.getElementById('mNotes').value;
  try {
    await saveDoc(currentTool.id, note, modalLinks, modalStatus, modalUrgency);
    updateCounts();
    renderGrid();
    msg.textContent = '✓ Saved to Appwrite!';
    msg.className = 'save-msg ok show';
    setTimeout(() => { msg.className = 'save-msg ok'; }, 3000);
  } catch (e) {
    console.error(e);
    msg.textContent = '✗ Save failed — open console for details';
    msg.className = 'save-msg err show';
  }
  btn.disabled = false;
  btn.textContent = 'Save Everything';
}

function maybeClose(e) { if (e.target === document.getElementById('overlay')) closeModal(); }
function closeModal() { document.getElementById('overlay').classList.remove('open'); currentTool = null; }

loadData();
</script>
