<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naina's GitHub Pack HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --text: #f0f0f0;
    --muted: #555;
    --red: #ff3b3b;
    --yellow: #f5c518;
    --blue: #3b82f6;
    --green: #22c55e;
    --purple: #a855f7;
    --pink: #ec4899;
    --orange: #f97316;
    --cyan: #06b6d4;

    --tag-learn: #a855f7;
    --tag-design: #ec4899;
    --tag-host: #3b82f6;
    --tag-pay: #22c55e;
    --tag-security: #f97316;
    --tag-productivity: #06b6d4;
    --tag-dev: #f5c518;
    --tag-domain: #ff3b3b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  /* LAYOUT */
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 24px 16px;
    gap: 8px;
  }

  .sidebar-logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 0 8px 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .sidebar-logo span { color: var(--yellow); }

  .sidebar-section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    padding: 8px 8px 4px;
    font-family: 'Space Mono', monospace;
  }

  .sidebar-btn {
    background: none;
    border: none;
    color: #aaa;
    text-align: left;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sidebar-btn:hover { background: var(--surface2); color: var(--text); }
  .sidebar-btn.active { background: var(--surface2); color: var(--text); }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* MAIN */
  .main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .search {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
  }
  .search:focus { border-color: var(--yellow); }
  .search::placeholder { color: var(--muted); }

  .count-badge {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* GRID */
  .grid {
    padding: 24px 28px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent, var(--yellow));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover { border-color: #333; transform: translateY(-2px); }
  .card:hover::before { opacity: 1; }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .card-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .card-emoji { font-size: 22px; }

  .card-type {
    display: inline-block;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .card-desc {
    font-size: 12px;
    color: #888;
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
  }

  .card-duration { color: var(--muted); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
  }
  .status-dot.done { background: var(--green); }
  .status-dot.progress { background: var(--yellow); }
  .status-dot.not-started { background: var(--muted); }

  /* URGENCY BADGE */
  .urgency {
    position: absolute;
    top: 14px;
    right: 14px;
    font-size: 9px;
    font-family: 'Space Mono', monospace;
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .urgency.now { background: rgba(255,59,59,0.15); color: var(--red); border: 1px solid rgba(255,59,59,0.3); }
  .urgency.soon { background: rgba(245,197,24,0.15); color: var(--yellow); border: 1px solid rgba(245,197,24,0.3); }
  .urgency.later { background: rgba(59,130,246,0.15); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 680px;
    max-height: 88vh;
    overflow-y: auto;
    padding: 32px;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 20px; right: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px; height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .modal-close:hover { color: var(--text); border-color: #444; }

  .modal-header { margin-bottom: 24px; }
  .modal-emoji { font-size: 36px; margin-bottom: 12px; }
  .modal-name { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
  .modal-tagline { color: #888; font-size: 14px; line-height: 1.5; }

  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .info-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }
  .info-block-label {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .info-block-value {
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
  }

  .full-width { grid-column: 1 / -1; }

  /* NOTES */
  .section-title {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 10px;
    margin-top: 20px;
  }

  .notes-area {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    resize: vertical;
    min-height: 120px;
    outline: none;
    transition: border 0.2s;
    line-height: 1.6;
  }
  .notes-area:focus { border-color: var(--yellow); }
  .notes-area::placeholder { color: var(--muted); }

  /* LINKS */
  .link-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .link-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border 0.2s;
  }
  .link-input:focus { border-color: var(--yellow); }
  .link-input::placeholder { color: var(--muted); }

  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { border-color: #444; background: #222; }
  .btn.primary { background: var(--yellow); color: #000; border-color: var(--yellow); font-weight: 700; }
  .btn.primary:hover { background: #e6b800; }
  .btn.danger { color: var(--red); border-color: rgba(255,59,59,0.3); }
  .btn.danger:hover { background: rgba(255,59,59,0.1); }
  .btn.small { padding: 6px 10px; font-size: 11px; }

  .saved-link {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
  }
  .saved-link a {
    flex: 1;
    color: var(--blue);
    text-decoration: none;
    font-size: 13px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .saved-link a:hover { text-decoration: underline; }
  .saved-link .link-label {
    font-size: 11px;
    color: var(--muted);
    margin-right: 4px;
    font-family: 'Space Mono', monospace;
  }

  .status-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
  }

  .save-row {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    align-items: center;
  }

  .save-msg {
    font-size: 12px;
    color: var(--green);
    font-family: 'Space Mono', monospace;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .save-msg.show { opacity: 1; }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    gap: 12px;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--yellow);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
</style>
</head>

</div>

let linksList = []; // temp links for current modal

// ── APPWRITE ─────────────────────────────────────────────
async function loadFromAppwrite() {
  try {
    const res = await fetch(
      `${APPWRITE_URL}/databases/${DATABASE_ID}/collections/${COLLECTION_ID}/documents`,
      { headers: { 'X-Appwrite-Project': PROJECT_ID, 'Content-Type': 'application/json' } }
    );
    const data = await res.json();
    if (data.documents) {
      data.documents.forEach(doc => {
        savedData[doc.$id] = {
          note: doc.note || '',
          links: doc.links ? JSON.parse(doc.links) : [],
          status: doc.status || 'Not Started'
        };
      });
    }
  } catch (e) {
    console.log('Load error:', e);
  }
  renderGrid();
}

async function saveToAppwrite(toolId, noteVal, linksVal, statusVal) {
  const body = {
    note: noteVal,
    links: JSON.stringify(linksVal),
    status: statusVal
  };
  try {
    // Try update first
    const res = await fetch(
      `${APPWRITE_URL}/databases/${DATABASE_ID}/collections/${COLLECTION_ID}/documents/${toolId}`,
      {
        method: 'PATCH',
        headers: { 'X-Appwrite-Project': PROJECT_ID, 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: body })
      }
    );
    if (res.status === 404) {
      // Create if not exists
      await fetch(
        `${APPWRITE_URL}/databases/${DATABASE_ID}/collections/${COLLECTION_ID}/documents`,
        {
          method: 'POST',
          headers: { 'X-Appwrite-Project': PROJECT_ID, 'Content-Type': 'application/json' },
          body: JSON.stringify({ documentId: toolId, data: body })
        }
      );
    }
    savedData[toolId] = { note: noteVal, links: linksVal, status: statusVal };
  } catch (e) {
    console.log('Save error:', e);
  }
}

// ── RENDER ───────────────────────────────────────────────
function getTypeColor(type) {
  const map = {
    'Learning': 'var(--tag-learn)',
    'Design': 'var(--tag-design)',
    'Hosting': 'var(--tag-host)',
    'Payments': 'var(--tag-pay)',
    'Security': 'var(--tag-security)',
    'Productivity': 'var(--tag-productivity)',
    'Dev Tools': 'var(--tag-dev)',
    'Domain': 'var(--tag-domain)'
  };
  return map[type] || '#555';
}

function renderGrid() {
  const grid = document.getElementById('grid');
  let filtered = tools.filter(t => {
    if (currentFilter === 'all') return true;
    if (['now', 'soon', 'later'].includes(currentFilter)) return t.urgency === currentFilter;
    if (['Not Started', 'In Progress', 'Done'].includes(currentFilter)) {
      return (savedData[t.id]?.status || 'Not Started') === currentFilter;
    }
    return t.type === currentFilter;
  });

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(t =>
      t.name.toLowerCase().includes(q) ||
      t.tagline.toLowerCase().includes(q) ||
      t.type.toLowerCase().includes(q) ||
      t.baby.toLowerCase().includes(q)
    );
  }

  document.getElementById('countBadge').textContent = `${filtered.length} tools`;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">No tools found</div>';
    return;
  }

  grid.innerHTML = filtered.map(t => {
    const d = savedData[t.id] || {};
    const status = d.status || 'Not Started';
    const statusClass = status === 'Done' ? 'done' : status === 'In Progress' ? 'progress' : 'not-started';
    const typeColor = getTypeColor(t.type);
    return `
      <div class="card" style="--accent:${t.color}" onclick="openModal('${t.id}')">
        <div class="urgency ${t.urgency}">${t.urgency === 'now' ? '🔴 Now' : t.urgency === 'soon' ? '🟡 Soon' : '🔵 Later'}</div>
        <div class="card-top">
          <div>
            <div class="card-type" style="background:${typeColor}22;color:${typeColor}">${t.type}</div>
            <div class="card-name">${t.name}</div>
          </div>
          <div class="card-emoji">${t.emoji}</div>
        </div>
        <div class="card-desc">${t.tagline}</div>
        <div class="card-meta">
          <span class="card-duration">${t.duration}</span>
          <div class="status-dot ${statusClass}" title="${status}"></div>
        </div>
      </div>
    `;
  }).join('');
}

// ── FILTER / SEARCH ──────────────────────────────────────
function filterBy(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderGrid();
}

function searchTools(q) {
  searchQuery = q;
  renderGrid();
}

// ── MODAL ────────────────────────────────────────────────
function openModal(toolId) {
  const t = tools.find(x => x.id === toolId);
  if (!t) return;
  currentTool = t;

  const d = savedData[toolId] || {};
  linksList = d.links ? [...d.links] : [];

  document.getElementById('mEmoji').textContent = t.emoji;
  document.getElementById('mName').textContent = t.name;
  document.getElementById('mTagline').textContent = t.tagline;

  const typeColor = getTypeColor(t.type);
  document.getElementById('mGrid').innerHTML = `
    <div class="info-block">
      <div class="info-block-label">⏳ How Long</div>
      <div class="info-block-value">${t.duration}</div>
    </div>
    <div class="info-block">
      <div class="info-block-label">🏷️ Type</div>
      <div class="info-block-value" style="color:${typeColor}">${t.type}</div>
    </div>
    <div class="info-block full-width">
      <div class="info-block-label">👶 What Is It (Baby Explanation)</div>
      <div class="info-block-value">${t.baby}</div>
    </div>
    <div class="info-block">
      <div class="info-block-label">📋 Prerequisites</div>
      <div class="info-block-value">${t.prereqs}</div>
    </div>
    <div class="info-block">
      <div class="info-block-label">📖 What You Learn</div>
      <div class="info-block-value">${t.learn}</div>
    </div>
    <div class="info-block full-width">
      <div class="info-block-label">🚀 After This, You Can</div>
      <div class="info-block-value">${t.after}</div>
    </div>
    <div class="info-block full-width">
      <div class="info-block-label">🎯 How To Redeem</div>
      <div class="info-block-value">${t.redeem}</div>
    </div>
  `;

  document.getElementById('mNotes').value = d.note || '';
  document.getElementById('mStatus').value = d.status || 'Not Started';
  renderLinks();

  document.getElementById('saveMsg').classList.remove('show');
  document.getElementById('modalOverlay').classList.add('open');
}

function renderLinks() {
  const container = document.getElementById('savedLinks');
  if (!linksList.length) { container.innerHTML = ''; return; }
  container.innerHTML = linksList.map((l, i) => `
    <div class="saved-link">
      <span class="link-label">${l.label || 'Link'}</span>
      <a href="${l.url}" target="_blank">${l.url}</a>
      <button class="btn small danger" onclick="removeLink(${i})">✕</button>
    </div>
  `).join('');
}

function addLink() {
  const label = document.getElementById('linkLabel').value.trim();
  const url = document.getElementById('linkUrl').value.trim();
  if (!url) return;
  linksList.push({ label: label || 'Link', url });
  document.getElementById('linkLabel').value = '';
  document.getElementById('linkUrl').value = '';
  renderLinks();
}

function removeLink(i) {
  linksList.splice(i, 1);
  renderLinks();
}

async function saveData() {
  if (!currentTool) return;
  const note = document.getElementById('mNotes').value;
  const status = document.getElementById('mStatus').value;
  await saveToAppwrite(currentTool.id, note, linksList, status);
  const msg = document.getElementById('saveMsg');
  msg.classList.add('show');
  setTimeout(() => msg.classList.remove('show'), 2500);
  renderGrid();
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  currentTool = null;
}

// ── INIT ─────────────────────────────────────────────────
loadFromAppwrite();
</script>
</body>
</html>
